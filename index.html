<!DOCTYPE html>
<html>
<head>
  <title>Ninja Wall Run Game</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = {
  x: 100, y: 300, w: 40, h: 40,
  vx: 0, vy: 0,
  speed: 5,
  jumping: false,
  wallRunning: false
};

let gravity = 0.5;
let keys = {};

let walls = [
  {x: 0, y: 350, w: canvas.width, h: 50},
  {x: 400, y: 200, w: 20, h: 200},
  {x: 700, y: 150, w: 20, h: 250}
];

let enemies = [
  {x: 600, y: 310, w: 40, h: 40, alive: true}
];

window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);

function update() {
  player.vx = 0;

  if (keys['a']) player.vx = -player.speed;
  if (keys['d']) player.vx = player.speed;

  if (keys[' '] && !player.jumping) {
    player.vy = -10;
    player.jumping = true;
  }

  player.vy += gravity;

  player.x += player.vx;
  player.y += player.vy;

  player.wallRunning = false;

  walls.forEach(w => {
    // Floor collision
    if (
      player.x < w.x + w.w &&
      player.x + player.w > w.x &&
      player.y < w.y + w.h &&
      player.y + player.h > w.y
    ) {
      if (player.vy > 0) {
        player.y = w.y - player.h;
        player.vy = 0;
        player.jumping = false;
      }

      // Wall run
      if (
        player.x + player.w > w.x &&
        player.x < w.x + w.w &&
        keys['w']
      ) {
        player.vy = -2;
        player.wallRunning = true;
      }
    }
  });

  // Enemy interaction
  enemies.forEach(e => {
    if (
      e.alive &&
      player.x < e.x + e.w &&
      player.x + player.w > e.x &&
      player.y < e.y + e.h &&
      player.y + player.h > e.y
    ) {
      e.alive = false;
    }
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Player
  ctx.fillStyle = player.wallRunning ? 'cyan' : 'white';
  ctx.fillRect(player.x, player.y, player.w, player.h);

  // Walls
  ctx.fillStyle = 'gray';
  walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));

  // Enemies
  enemies.forEach(e => {
    if (e.alive) {
      ctx.fillStyle = 'red';
      ctx.fillRect(e.x, e.y, e.w, e.h);
    }
  });
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
